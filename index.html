<body>

  <!-- Menu Navigation -->
  <nav class="menu-nav">

      </button>
      <button class="nav-item" data-category="bebidas">
        <i class="fas fa-wine-glass-alt"></i>

      </button>
    </div>
  </nav>

  <!-- Menu Section -->
  <main class="menu-main">
    <div class="container">
      <div class="menu-header">

        <p class="menu-description">Pequenas criações para começar sua experiência</p>
      </div>

  <!-- Carrinho flutuante -->
  <div class="cart-floating" onclick="toggleCart()">
    <i class="fas fa-shopping-bag"></i>
    <span class="cart-count" id="cart-count">0</span>
  </div>

  <!-- Modal do Carrinho -->
  <div id="cart-modal" class="cart-modal">
    <div class="cart-header">
      <span><i class="fas fa-shopping-bag"></i> Seu pedido</span>

    <button class="cart-checkout" onclick="alert('Em breve! Finalização do pedido via WhatsApp')">
